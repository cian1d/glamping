meta:
  environment: python
  toolchain:
    name: pip
    version: "3.10"
build:
  requirementsPath: requirements.txt
  useCache: true
  # Добавляем артефакты, чтобы сервер видел папки с HTML и CSS
  artifacts:
    - templates
    - static
    - app.py
    - main.py
    - bot.py
    - .env
    - glamping.db

run:
  # Явно указываем команду запуска через python
  command: python app.py
  persistenceMount: /data
  containerPort: 80
  servicePort: 80