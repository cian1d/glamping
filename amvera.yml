meta:
  environment: python
  toolchain:
    name: pip
    version: "3.10"
build:
  requirementsPath: requirements.txt
  useCache: true
  # КРИТИЧЕСКИЙ БЛОК: без этого Flask не увидит ваши HTML и CSS
  artifacts:
    - templates
    - static
    - app.py
    - main.py
    - bot.py
    - .env
    - glamping.db

run:
  # Меняем scriptName на явную команду запуска
  command: python app.py
  persistenceMount: /data
  containerPort: 80