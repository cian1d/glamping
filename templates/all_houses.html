{% extends 'base.html' %}

{% block content %}
<style>
    /* 1. Делаем карточку гибкой */
    .house-wide-card {
        display: flex;
        flex-wrap: wrap; /* Позволяет тексту упасть под картинку */
        gap: 0;
        margin-bottom: 30px;
        text-decoration: none;
        color: inherit;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        transition: transform 0.3s ease;
    }

    /* 2. Картинка занимает 100% на мобильных и 40% на десктопе */
    .wide-card-image {
        flex: 1 1 300px; /* Базовая ширина 300px, может расти */
        height: 250px;
        background-size: cover;
        background-position: center;
        position: relative;
    }

    /* 3. Контентная часть */
    .wide-card-content {
        flex: 1 1 350px; /* Базовая ширина 350px */
        padding: 30px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-sizing: border-box; /* Важно! */
    }
</style>
<h1 style="text-align: center; font-family: var(--font-header); font-size: clamp(2rem, 8vw, 3.5rem); margin-bottom: 30px; padding: 0 10px;">
    Наши Домики
</h1>
<div class="container" style="margin-top: 30px; padding: 0 15px; width: 100%; max-width: 100%; box-sizing: border-box; overflow-x: hidden;">

    <div class="houses-list-vertical">
        {% for house in houses %}
        <a href="/house/{{ house['id'] }}" class="house-wide-card">
            <div class="wide-card-image" style="background-image: url('{{ house['image_url'] }}');">
                <div class="price-badge">от {{ house['price_per_night'] }}₽ / ночь</div>
            </div>

            <div class="wide-card-content">
                <h2 class="wide-card-title">{{ house['name'] }}</h2>
                <div class="wide-card-features">
                    <span>🌲 Лесной вид</span>
                    <span>🔥 Камин</span>
                    <span>📶 Wi-Fi</span>
                </div>
                <p class="wide-card-description">{{ house['short_description'] }}</p>
                <span class="wide-card-link">Узнать подробнее →</span>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
