<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Глэмпинг ZD{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/airbnb.css">
    <script src="https://unpkg.com/imask"></script>

    <style>
        /* 1. Обнуляем системные отступы */
        body, html {
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Чтобы не появилась горизонтальная прокрутка */
        }
        /* 1. ПОЛНОСТЬЮ ЗАНЯТЫЕ ДНИ (Внутри диапазона или пересменка) */
        /* Класс .disabled-range мы даем дням внутри, а сочетание классов — для пересменки */
        .flatpickr-day.disabled-range,
        .flatpickr-day.booked-morning.booked-evening {
            background: #ffcccc !important;
            color: #a34747 !important;
            border-radius: 0 !important;
            border: none !important;
        }

        /* 2. ТОЛЬКО ВЫЕЗД (Красный сверху слева) */
        .flatpickr-day.booked-morning:not(.booked-evening) {
            background: linear-gradient(135deg, #ffcccc 50%, #ffffff 50%) !important;
            color: #a34747 !important;
        }

        /* 3. ТОЛЬКО ЗАЕЗД (Красный снизу справа) */
        .flatpickr-day.booked-evening:not(.booked-morning) {
            background: linear-gradient(135deg, #ffffff 50%, #ffcccc 50%) !important;
            color: #a34747 !important;
        }

        /* 4. ПРОШЕДШИЕ ДНИ (Серые) */
        /* Селектор :not гарантирует, что серый не перекроет красные брони */
        .flatpickr-day.flatpickr-disabled:not(.disabled-range):not(.booked-morning):not(.booked-evening) {
            background: #f5f5f5 !important;
            color: #d0d0d0 !important;
            text-decoration: none !important;
            border: none !important;
        }

        /* Общий сброс для красоты */
        .flatpickr-day { border-radius: 0 !important; }

        /* Стили для модального окна с анимацией */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px); /* Размытие заднего фона */
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            /* Начальное положение: чуть ниже и меньше */
            transform: translateY(30px) scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0) scale(1); /* Конечное положение */
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* 2. Растягиваем Hero блок */
        .hero {
            width: 100vw; /* Ширина на весь экран (view width) */
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            height: 90vh; /* Увеличили с 60vh до 80vh для большей высоты */
            background-size: cover;
            background-position: center;
            margin-top: 0;
            margin-bottom: 50px;
        }

        /* 3. Центрируем содержимое внутри Hero */
        .hero-container {
            max-width: 1200px; /* Содержимое (текст и кнопка) остается в рамках 1200px */
            margin: 0 auto;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Затемнение фона для читаемости текста */
        .hero-overlay {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Полупрозрачный черный */
            display: flex;
            align-items: center;
        }

        .hero-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            color: white;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .hero-text p {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 10px;
        }

        /* Большая красивая кнопка */
        .btn-hero {
            padding: 20px 45px;
            background-color: var(--accent-wood);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        .btn-hero:hover {
            transform: translateY(-3px);
            background-color: #e0e0e0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* Адаптивность для телефонов */
        @media (max-width: 768px) {
            .hero-container {
                flex-direction: column;
                text-align: center;
            }
            .hero-text h1 { font-size: 2.5rem; }
            .hero-action { margin-top: 30px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
</head>
<body>

<nav class="main-nav">
    <div class="nav-container">
        <a href="/" class="logo">
            <div class="logo-icon">🌿</div>
            <span>Глэмпинг ZD</span>
        </a>
        <div class="nav-links">
            <a href="/"
               style="{% if request.path == '/' %} opacity: 1; border-bottom: 2px solid var(--accent-wood); {% endif %}">
                Главная
            </a>
            <a href="{{ url_for('all_houses') }}"
               style="{% if request.path == '/houses' %} opacity: 1; border-bottom: 2px solid var(--accent-wood); {% endif %}">
                Домики
            </a>
            <a href="{{ url_for('services') }}"
               style="{% if request.path == '/services' %} opacity: 1; border-bottom: 2px solid var(--accent-wood); {% endif %}">
                Услуги
            </a>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="main-footer">
    <div class="footer-container">
        <div class="footer-left">
            <p>&copy; 2026 Глэмпинг ZD.</p>
            <a href="/privacy" style="color: #666; text-decoration: underline; font-size: 0.9rem;">Политика конфиденциальности</a>
            <a href="/oferta" style="margin: 0 15px; color: #666; text-decoration: none;">Публичная оферта</a>
        </div>
        <div class="footer-right">
            <h4>Контактные данные</h4>
            <p>Тел: +7 960 050 60 61</p>
            <p>Email: glebegor1982@gmail.com</p>
        </div>
    </div>
</footer>
{% block scripts %}{% endblock %}
</body>
</html>
